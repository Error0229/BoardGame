version: '3.8'
services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    environment:
      - PORT=3456
      - NODE_ENV=production
      - DEBUG_GAME=0
    ports:
      - "3456:3456"

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ../client/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
