server {
  listen 80;
  server_name your.domain.com; # <-- replace with your domain or IP

  root /var/www/kindred; # <-- point to client/dist
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy socket.io (ensure upgrade headers)
  location /socket.io/ {
    proxy_pass http://127.0.0.1:3456;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Assets (proxied to server static assets)
  location /assets/ {
    proxy_pass http://127.0.0.1:3456/assets/;
  }

  # Optional: redirect HTTP->HTTPS (if you set up TLS)
  # Uncomment the following if you add SSL certs
  # return 301 https://$host$request_uri;
}
